version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flowdo-api
    restart: unless-stopped
    ports:
      - "3000:8080"
    env_file:
      - .env
    environment:
      # Override DSN: inside Docker network, use service name "postgres" not "localhost"
      DATABASE_DSN: postgres://${POSTGRES_USER:-flowdo}:${POSTGRES_PASSWORD:-secret}@postgres:5432/${POSTGRES_DB:-flowdo_db}?sslmode=disable
      REDIS_ADDR: redis:6379
      # CORS: comma-separated allowed origins. Override in .env for production.
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - flowdo-net

  postgres:
    image: postgres:16-alpine
    container_name: flowdo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-flowdo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: ${POSTGRES_DB:-flowdo_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-flowdo} -d ${POSTGRES_DB:-flowdo_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - flowdo-net

  redis:
    image: redis:7-alpine
    container_name: flowdo-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispass}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - flowdo-net

volumes:
  postgres_data:
  redis_data:

networks:
  flowdo-net:
    driver: bridge
